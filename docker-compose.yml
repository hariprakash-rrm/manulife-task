services:
  app:
    build: .
    ports:
      - "80:80"
      - "3000:3000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_in_production}
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
