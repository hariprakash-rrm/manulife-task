[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

; ── MongoDB ─────────────────────────────────────────────────────────────────
[program:mongodb]
command=sh -c "chown -R mongodb:mongodb /data/db /var/log/mongodb && exec runuser -u mongodb -- mongod --dbpath /data/db --bind_ip 127.0.0.1 --logpath /var/log/mongodb/mongod.log"
priority=10
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/null
stderr_logfile=/var/log/supervisor/mongodb.err.log

; ── Redis ────────────────────────────────────────────────────────────────────
[program:redis]
command=redis-server --bind 127.0.0.1 --daemonize no --loglevel warning
priority=10
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/null
stderr_logfile=/var/log/supervisor/redis.err.log

; ── NestJS backend ───────────────────────────────────────────────────────────
; Retries up to 10× so MongoDB has time to become ready before the first connection
[program:backend]
command=node /app/dist/main
directory=/app
environment=NODE_ENV="production",PORT="3000",MONGO_URI="mongodb://127.0.0.1:27017/portfolio",REDIS_HOST="127.0.0.1",REDIS_PORT="6379",JWT_SECRET="%(ENV_JWT_SECRET)s",JWT_REFRESH_SECRET="%(ENV_JWT_REFRESH_SECRET)s"
priority=20
autostart=true
autorestart=true
startretries=10
startsecs=3
stdout_logfile=/var/log/supervisor/backend.out.log
stderr_logfile=/var/log/supervisor/backend.err.log

; ── Nginx (serves frontend + proxies /api/ → backend) ───────────────────────
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
priority=30
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/null
stderr_logfile=/var/log/supervisor/nginx.err.log

; ── Startup Banner ───────────────────────────────────────────────────────────────
[program:banner]
command=sh -c "sleep 4 && echo '=================================================================' && echo '🚀 PORTFOLIO DASHBOARD IS READY!' && echo '👉 Open http://localhost in your browser to view the application.' && echo '================================================================='"
priority=100
autostart=true
autorestart=false
startsecs=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
