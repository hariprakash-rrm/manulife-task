<!-- Top Loading Bar (for queries/background fetches) -->
@if (loaderService.queryLoading()) {
  <div class="fixed top-0 left-0 right-0 h-[3px] bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500 bg-[length:200%_auto] animate-loading-bar z-[99999] shadow-sm shadow-indigo-500/20"></div>
}

<!-- Mutate Loader Overlay (frosted glass lock screen for write actions) -->
@if (loaderService.mutateLoading()) {
  <div class="fixed inset-0 bg-slate-900/15 backdrop-blur-xs flex items-center justify-center z-[99998] transition-opacity duration-300">
    <div class="bg-white/90 p-7 rounded-2xl border border-slate-200/80 shadow-2xl flex flex-col items-center gap-4 text-center max-w-[280px]">
      <div class="w-10 h-10 border-[3.5px] border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
      <div class="text-[13.5px] font-bold text-slate-800 tracking-wide">Processing transaction...</div>
    </div>
  </div>
}

<!-- Toast Notifications Stack -->
<div class="fixed top-6 right-6 flex flex-col gap-3 z-[99999] max-w-sm w-full px-4 sm:px-0">
  @for (toast of toastService.toasts(); track toast.id) {
    <div 
      [class]="'flex items-start gap-3.5 p-4 rounded-xl border shadow-lg transition-all duration-300 transform translate-y-0 opacity-100 hover:translate-x-[-4px] backdrop-blur-md ' + getToastClass(toast.type)"
    >
      <!-- Icon representation -->
      <div class="flex-shrink-0 mt-0.5">
        @switch (toast.type) {
          @case ('success') {
            <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
          @case ('error') {
            <svg class="w-5 h-5 text-rose-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
          @case ('warning') {
            <svg class="w-5 h-5 text-amber-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          }
          @default {
            <svg class="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
        }
      </div>

      <!-- Toast Message -->
      <span class="text-[13px] font-semibold flex-1 leading-normal">{{ toast.message }}</span>

      <!-- Dismiss Button -->
      <button 
        class="text-slate-400 hover:text-slate-600 cursor-pointer text-[11px] p-0.5 mt-0.5 transition-colors duration-150" 
        (click)="toastService.dismiss(toast.id)"
        title="Dismiss alert"
      >
        ✕
      </button>
    </div>
  }
</div>

<router-outlet />
